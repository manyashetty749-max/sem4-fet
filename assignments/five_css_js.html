<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #1a0f2e;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .controls { margin: 20px; z-index: 100; }

        button {
            padding: 10px 15px;
            margin: 5px;
            background-color: #a259ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .stack-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin-top: 50px;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 0.3s ease, z-index 0.1s;
            border: 2px solid rgba(255,255,255,0.1);
        }

        #layer1 { background-color: #4c1d95; transform: translate(0, 0); }
        #layer2 { background-color: #6d28d9; transform: translate(20px, 20px); }
        #layer3 { background-color: #8b5cf6; transform: translate(40px, 40px); }

        .active {
            border: 3px solid #d291ff !important;
            box-shadow: 0 0 20px rgba(162, 89, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="bringToFront('layer1')">Show Layer 1</button>
        <button onclick="bringToFront('layer2')">Show Layer 2</button>
        <button onclick="bringToFront('layer3')">Show Layer 3</button>
    </div>

    <div class="stack-container">
        <div id="layer1" class="layer">Education</div>
        <div id="layer2" class="layer">Skills</div>
        <div id="layer3" class="layer">Projects</div>
    </div>

    <script>
        function bringToFront(id) {
            const layers = document.querySelectorAll('.layer');

            layers.forEach(layer => {
                layer.style.zIndex = "1";
                layer.classList.remove('active');
            });

            const selectedLayer = document.getElementById(id);
            selectedLayer.style.zIndex = "10";
            selectedLayer.classList.add('active');
        }
    </script>

</body>
</html>
