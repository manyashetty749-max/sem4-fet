<!DOCTYPE html>
<html>
<head>

    <style>

        body {

            background-color: #1a0f2e;

            color: white;

            display: flex;

            flex-direction: column;

            align-items: center;

            font-family: sans-serif;

            padding-top: 50px;

            margin: 0;

            min-height: 100vh;

        }

        .btn-group {

            margin-bottom: 30px;

        }

        button {

            padding: 10px 20px;

            margin: 0 5px;

            background-color: #a259ff;

            color: white;

            border: none;

            border-radius: 4px;

            cursor: pointer;

            font-weight: bold;

            transition: 0.3s;

        }

        button:hover {

            background-color: #d291ff;

            color: #1a0f2e;

        }

        .container {

            position: relative;

            width: 300px;

            height: 200px;

        }

        .box {

            position: absolute;

            width: 100%;

            height: 100%;

            border-radius: 12px;

            display: flex;

            justify-content: center;

            align-items: center;

            font-size: 1.2rem;

            border: 2px solid rgba(255,255,255,0.2);

            transition: z-index 0.01s;

        }

        #box1 {

            background-color: #4c1d95;

            z-index: 3;

        }

        #box2 {

            background-color: #6d28d9;

            z-index: 2;

        }

        #box3 {

            background-color: #8b5cf6;

            z-index: 1;

        }

        /* HOME PAGE BUTTON */

        .home-btn {

            margin-top: 40px;

            background-color: #a259ff;

            color: white;

            padding: 12px 20px;

            border-radius: 8px;

            text-decoration: none;

            font-weight: bold;

            transition: 0.3s;

            box-shadow: 0 0 10px rgba(162,89,255,0.5);

        }

        .home-btn:hover {

            background-color: #d291ff;

            color: #1a0f2e;

            transform: scale(1.05);

        }

    </style>

</head>

<body>

    <div class="btn-group">

        <button onclick="bringToFront('box1')">
            Layer 1
        </button>

        <button onclick="bringToFront('box2')">
            Layer 2
        </button>

        <button onclick="bringToFront('box3')">
            Layer 3
        </button>

    </div>

    <div class="container">

        <div id="box1" class="box">
            1: Education
        </div>

        <div id="box2" class="box">
            2: Skills
        </div>

        <div id="box3" class="box">
            3: Experience
        </div>

    </div>

    <!-- HOME PAGE BUTTON -->

    <a href="https://manyashetty749-max.github.io/sem4-fet/index.html"
       class="home-btn">

       Home Page

    </a>

    <script>

        function bringToFront(selectedId) {

            const boxes =
            document.querySelectorAll('.box');

            boxes.forEach(box => {

                box.style.zIndex = "1";

            });

            document.getElementById(selectedId)
            .style.zIndex = "10";

        }

    </script>

</body>
</html>
