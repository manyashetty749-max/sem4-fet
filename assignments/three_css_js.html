<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Healthcare Form</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0c3fc, #cba6f7, #b8c0ff, #f3e8ff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        form {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: #4a148c; margin-top: 0; }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        textarea { height: 80px; resize: none; }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #8e44ad;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #732d91; transform: translateY(-1px); }

        #result {
            width: 100%;
            max-width: 400px;
            margin-top: 25px;
        }

        .patient-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #8e44ad;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .prediction-high { color: #d32f2f; font-weight: bold; }
        #error { color: #d32f2f; font-size: 13px; margin-top: 10px; min-height: 18px; }
    </style>
</head>
<body>

<form id="form">
    <h2>🏥 Health Screener</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="number" id="age" placeholder="Age">

    <select id="category">
        <option value="">Select Department</option>
        <option value="General">General Medicine</option>
        <option value="Cardiology">Cardiology</option>
        <option value="Endocrinology">Endocrinology</option>
    </select>

    <textarea id="symptoms" placeholder="Describe how you feel (e.g. chest pain, fever, thirst...)"></textarea>
    
    <div id="error"></div>
    <button type="submit">Analyze & Save</button>
</form>

<div id="result"></div>

<script>
let users = [];

function predict(symptoms) {
    const input = symptoms.toLowerCase();
    
    const conditions = [
        { key: ["headache", "migraine", "tension"], label: "Neurological / Stress" },
        { key: ["thirst", "frequent pee", "sugar", "blurred"], label: "Possible Diabetes (Glucose Check Recommended)" },
        { key: ["fever", "cough", "sore throat", "flu", "cold"], label: "Viral Infection / Respiratory" },
        { key: ["chest", "palpitation", "heart", "breathless"], label: "Urgent: Cardiovascular Screening Required" }
    ];

    let finalPrediction = "General Consultation Advised";

    
    conditions.forEach(cond => {
        if (cond.key.some(k => input.includes(k))) {
            finalPrediction = cond.label;
        }
    });

    return finalPrediction;
}

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const age = document.getElementById("age").value;
    const category = document.getElementById("category").value;
    const symptoms = document.getElementById("symptoms").value.trim();
    const error = document.getElementById("error");

    if (!/^[A-Za-z ]+$/.test(name)) return error.innerText = "Please enter a valid name";
    if (!age || age <= 0 || age > 120) return error.innerText = "Please enter a realistic age";
    if (!category) return error.innerText = "Please select a category";
    if (symptoms.length < 3) return error.innerText = "Please describe symptoms in detail";

    error.innerText = "";

    const prediction = predict(symptoms);
    users.unshift({name, age, category, symptoms, prediction}); 

    showData();
    this.reset();
});

function showData() {
    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "<h3>Recent Patients</h3>";

    users.forEach((u, i) => {
        const isUrgent = u.prediction.includes("Urgent");
        
        resultDiv.innerHTML += `
            <div class="patient-card">
                <strong>${u.name} (${u.age}y)</strong><br>
                <small>Dept: ${u.category}</small><hr>
                <p style="font-size: 0.9em; margin: 5px 0;">"${u.symptoms}"</p>
                <span class="${isUrgent ? 'prediction-high' : ''}">
                    Result: ${u.prediction}
                </span>
            </div>
        `;
    });
}
</script>

</body>
</html>
