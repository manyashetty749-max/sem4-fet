<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Manya Shetty | Secure Terminal</title>

    <style>

        :root {

            --bg-color: #1a0f2e;
            --accent-purple: #a259ff;
            --light-purple: #d291ff;
            --glass: rgba(255, 255, 255, 0.05);
            --error: #ff4d4d;

        }

        body {

            font-family: 'Segoe UI', sans-serif;

            background-color: var(--bg-color);

            background-image:
            radial-gradient(circle at center,
            #2d1b4d 0%,
            #1a0f2e 100%);

            color: white;

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            margin: 0;

            overflow: hidden;

        }

        .security-card {

            background: var(--glass);

            backdrop-filter: blur(15px);

            border: 1px solid
            rgba(162, 89, 255, 0.3);

            border-radius: 20px;

            padding: 3rem;

            text-align: center;

            box-shadow:
            0 8px 32px 0 rgba(0, 0, 0, 0.8);

            width: 350px;

        }

        .icon-box {

            width: 80px;
            height: 80px;

            background: var(--accent-purple);

            border-radius: 50%;

            margin: 0 auto 1.5rem;

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 2rem;

            box-shadow: 0 0 20px
            var(--accent-purple);

        }

        h1 {

            color: var(--light-purple);

        }

        p {

            color: #b0a3c4;

        }

        input {

            background: rgba(0, 0, 0, 0.3);

            border: 1px solid
            var(--accent-purple);

            border-radius: 8px;

            padding: 12px;

            width: 100%;

            color: white;

            text-align: center;

            font-size: 1rem;

            margin-bottom: 1rem;

            box-sizing: border-box;

            outline: none;

        }

        button {

            background: var(--accent-purple);

            color: white;

            border: none;

            border-radius: 8px;

            padding: 12px;

            width: 100%;

            font-weight: bold;

            cursor: pointer;

        }

        button:hover {

            background: var(--light-purple);

        }

        #status-msg {

            margin-top: 1rem;

        }

        .error {

            color: var(--error);

        }

        .success {

            color: #00ff88;

        }

        /* PORTAL */

        #portal {

            display: none;

            margin-top: 20px;

            text-align: left;

        }

        .portal-card {

            background: rgba(255,255,255,0.05);

            padding: 15px;

            border-radius: 10px;

            margin-top: 10px;

            border: 1px solid
            rgba(162,89,255,0.3);

        }

        table {

            width: 100%;

            border-collapse: collapse;

            margin-top: 10px;

        }

        table, th, td {

            border: 1px solid #b48cff;

        }

        th {

            background: #a259ff;

            padding: 8px;

        }

        td {

            padding: 8px;

            background: rgba(255,255,255,0.05);

        }

    </style>

</head>

<body>

    <div class="security-card">

        <div class="icon-box">🔒</div>

        <h1>System Access</h1>

        <p id="attempts-left">
            Identity Verification Required
        </p>

        <input type="password"
               id="passInput"
               placeholder="Enter Security Code"
               autofocus>

        <button id="verifyBtn">
            Unlock Terminal
        </button>

        <div id="status-msg"></div>

        <!-- PORTAL -->

        <div id="portal">

            <div class="portal-card">

                <h3>Student Details</h3>

                <p>Name : Manya Shetty</p>

                <p>USN : 4MT23CS001</p>

                <p>Branch : CSE</p>

                <p>CGPA : 8.9</p>

            </div>

            <div class="portal-card">

                <h3>Attendance</h3>

                <table>

                    <tr>
                        <th>Subject</th>
                        <th>Attendance</th>
                    </tr>

                    <tr>
                        <td>Java</td>
                        <td>92%</td>
                    </tr>

                    <tr>
                        <td>Frontend</td>
                        <td>95%</td>
                    </tr>

                    <tr>
                        <td>DSA</td>
                        <td>89%</td>
                    </tr>

                </table>

            </div>

        </div>

    </div>

     <a href="https://manyashetty749-max.github.io/sem4-fet/">home page</a>

    <script src="script.js"></script>

</body>
</html>
