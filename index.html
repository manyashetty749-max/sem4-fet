<!DOCTYPE html>
<html>
<head>
  <title>Manya's Portfolio</title>
  <style>
    body {
      background-color:white; /* A slightly smoother orange */
      display: flex;
      justify-content: center;   
      align-items: center;      
      min-height: 100vh;            
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Main container card */
    .card {
      background-color: black;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    /* List styling */
    ol {
      list-style: none;
      padding: 0;
      display: grid;
      grid-template-columns: 1fr 1fr; /* Creates two columns for links */
      gap: 10px;
    }

    li a {
      display: block;
      background-color: #f4f4f4;
      color: #333;
      text-decoration: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      border: 1px solid #ddd;
    }

    /* Hover effect for links */
    li a:hover {
      background-color: #ff9800;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    /* Makes the last link span across both columns if odd number */
    li:last-child:nth-child(odd) {
      grid-column: span 2;
    }
  </style>
</head>
<body>
