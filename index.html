      margin: 0;
      font-family: Arial, sans-serif;

    .card {
      background-color: #22063f;
      padding: 40px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);

    }

    ol {
      list-style: none;
      padding: 0;

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    li a {

      display: block;
      background-color: black;
      color: white;
      text-decoration: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.3s;
      border: 1px solid #c77dff;

    }

    li a:hover {

      background-color: #c77dff;
      color: black;
      transform: scale(1.05);

    }

    li:last-child:nth-child(odd) {
      grid-column: span 2;
    }

  </style>
